services:
  web:
    build:
      context: ..
      dockerfile: src/LibrarySeatReservation.Web/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=(localdb)\\mssqllocaldb;Database=LibrarySeatReservationDb;Trusted_Connection=True;
    restart: unless-stopped
