<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约提交 - 图书馆座位预约系统</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <a href="index.html" class="logo">图书馆座位预约</a>
    <div class="nav-items">
      <a href="index.html" class="nav-item">首页</a>
      <a href="seat-list.html" class="nav-item active">座位列表</a>
      <a href="my-reservations.html" class="nav-item">我的预约</a>
      <a href="../admin/login.html" class="nav-item">管理员入口</a>
    </div>
  </nav>

  <!-- 页面内容 -->
  <div class="page-content">
    <div class="container">
      <!-- 返回链接 -->
      <a href="seat-detail.html" style="display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px; font-size: 14px;">← 返回详情</a>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
        <!-- 左侧：座位信息卡片 -->
        <div class="card">
          <h3 style="margin-bottom: 16px;">预约信息</h3>
          <div style="margin-bottom: 16px;">
            <div style="font-size: 14px; font-weight: 500; color: var(--text-body); margin-bottom: 4px;">座位编号</div>
            <div>A-01</div>
          </div>
          <div style="margin-bottom: 16px;">
            <div style="font-size: 14px; font-weight: 500; color: var(--text-body); margin-bottom: 4px;">位置</div>
            <div>三楼靠窗</div>
          </div>
          <div>
            <div style="font-size: 14px; font-weight: 500; color: var(--text-body); margin-bottom: 4px;">当前用户</div>
            <div>张三</div>
          </div>
        </div>

        <!-- 右侧：预约表单 -->
        <div class="card">
          <h3 style="margin-bottom: 16px;">提交预约</h3>

          <!-- 成功提示示例（隐藏） -->
          <div class="alert alert-success hidden">
            预约成功！
          </div>

          <!-- 冲突提示示例（隐藏） -->
          <div class="alert alert-danger hidden">
            该时段已被预约，请选择其他时段
          </div>

          <form>
            <div class="form-group">
              <label class="form-label">选择日期</label>
              <input type="date" class="form-control" value="2026-07-14">
              <div class="form-text">只能预约今天及以后的日期</div>
            </div>

            <div class="form-group">
              <label class="form-label">选择时段</label>
              <select class="form-control">
                <option value="">请选择时段</option>
                <option value="0">08:00-10:00</option>
                <option value="1">10:00-12:00</option>
                <option value="2">14:00-16:00</option>
                <option value="3">16:00-18:00</option>
                <option value="4">19:00-21:00</option>
              </select>
            </div>

            <!-- 表单验证错误示例（隐藏） -->
            <div class="form-error hidden">请选择时段</div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
              <button type="submit" class="btn btn-primary" style="flex: 1;">提交预约</button>
              <a href="seat-detail.html" class="btn btn-outline" style="flex: 1;">返回</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部安全留白 -->
  <div style="height: 24px;"></div>
</body>
</html>
