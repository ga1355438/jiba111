<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约提交 - 图书馆座位预约系统</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <div class="logo">图书馆座位预约</div>
    <div class="nav-items">
      <span class="nav-item">首页</span>
      <span class="nav-item active">座位列表</span>
      <span class="nav-item">我的预约</span>
      <div class="user-dropdown">
        <button class="user-btn">当前用户：张三 ▾</button>
        <div class="dropdown-menu">
          <div class="dropdown-item">张三</div>
          <div class="dropdown-item">李四</div>
          <div class="dropdown-item">王五</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <div class="page-content">
    <div class="container">
      <!-- 返回链接 -->
      <a href="#" style="display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px; font-size: 14px;">← 返回详情</a>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
        <!-- 左侧：座位信息卡片 -->
        <div class="card">
          <div class="card-header">
            <h3>预约信息</h3>
          </div>
          <div style="margin-bottom: 16px;">
            <div class="form-label">座位编号</div>
            <div>A-01</div>
          </div>
          <div style="margin-bottom: 16px;">
            <div class="form-label">位置</div>
            <div>三楼靠窗</div>
          </div>
          <div style="margin-bottom: 16px;">
            <div class="form-label">电源</div>
            <div>有</div>
          </div>
          <div>
            <div class="form-label">当前用户</div>
            <div>张三</div>
          </div>
        </div>

        <!-- 右侧：预约表单 -->
        <div class="card">
          <div class="card-header">
            <h3>提交预约</h3>
          </div>
          <form>
            <div class="form-group">
              <label class="form-label">选择日期</label>
              <input type="date" class="form-control" value="2026-07-14">
              <div class="form-text">只能预约今天及以后的日期</div>
            </div>

            <div class="form-group">
              <label class="form-label">选择时段</label>
              <select class="form-control">
                <option value="">请选择时段</option>
                <option value="0">08:00-10:00</option>
                <option value="1">10:00-12:00</option>
                <option value="2">14:00-16:00</option>
                <option value="3">16:00-18:00</option>
                <option value="4">19:00-21:00</option>
              </select>
            </div>

            <!-- 冲突提示示例 -->
            <div class="alert alert-danger" style="display: none;">
              该时段已被预约，请选择其他时段
            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
              <button type="submit" class="btn btn-primary" style="flex: 1;">提交预约</button>
              <a href="#" class="btn btn-outline" style="flex: 1;">返回</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
